version: 1
root: taproot/

# Which agent adapters to generate. Remove any you don't use.
agents:
  - claude    # Claude Code → .claude/commands/tr-taproot.md
  - cursor    # Cursor → .cursor/rules/taproot.md
  - generic   # Any other agent → AGENTS.md

# Vocabulary overrides — replaces dev-specific terms in installed skill files.
# Run `taproot update` after init to apply these substitutions.
vocabulary:
  tests: manuscript reviews
  source files: chapters
  implementation: writing
  build: compile draft

# Definition of Done — adapt to your writing and review workflow
definitionOfDone:
  - document-current: README.md reflects the current manuscript structure and chapter status
  - check: "does this change require updating the chapter outline or table of contents?"
  - check: "has the new or revised content been through at least one editorial review?"
