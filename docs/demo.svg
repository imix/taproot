<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <defs>
    <style>
      .terminal { font-family: 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace; font-size: 13px; }
      .prompt   { fill: #7eca5c; }
      .cmd      { fill: #e8e8e8; }
      .dim      { fill: #666; }
      .out      { fill: #888; }
      .green    { fill: #7eca5c; }
      .blue     { fill: #569cd6; }
      .yellow   { fill: #dcdcaa; }
      .white    { fill: #e8e8e8; }
      .cyan     { fill: #4ec9b0; }
      .orange   { fill: #ce9178; }

      /* cursor blink */
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .cursor { fill: #e8e8e8; animation: blink 1s step-start infinite; }

      /* fade in blocks */
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }

      /* typing effect via clip-rect width */
      @keyframes type1  { from{width:0} to{width:360px} }
      @keyframes type2  { from{width:0} to{width:300px} }
      @keyframes type3  { from{width:0} to{width:420px} }
      @keyframes type4  { from{width:0} to{width:380px} }
      @keyframes type5  { from{width:0} to{width:320px} }
      @keyframes type6  { from{width:0} to{width:260px} }
      @keyframes type7  { from{width:0} to{width:340px} }
      @keyframes type8  { from{width:0} to{width:200px} }

      .clip1  { clip-path: inset(0 0 0 0); animation: fadeIn 0.01s 0.5s both; }
      .clip2  { animation: fadeIn 0.01s 2.2s both; opacity:0; }
      .clip3  { animation: fadeIn 0.01s 3.0s both; opacity:0; }
      .clip4  { animation: fadeIn 0.01s 3.6s both; opacity:0; }
      .clip5  { animation: fadeIn 0.01s 5.0s both; opacity:0; }
      .clip6  { animation: fadeIn 0.01s 5.8s both; opacity:0; }
      .clip7  { animation: fadeIn 0.01s 6.4s both; opacity:0; }
      .clip8  { animation: fadeIn 0.01s 7.2s both; opacity:0; }
      .clip9  { animation: fadeIn 0.01s 8.0s both; opacity:0; }
      .clip10 { animation: fadeIn 0.01s 8.6s both; opacity:0; }
      .clip11 { animation: fadeIn 0.01s 9.2s both; opacity:0; }
      .clip12 { animation: fadeIn 0.01s 9.8s both; opacity:0; }
      .clip13 { animation: fadeIn 0.01s 10.4s both; opacity:0; }
      .clip14 { animation: fadeIn 0.01s 11.0s both; opacity:0; }
      .clip15 { animation: fadeIn 0.01s 11.6s both; opacity:0; }

      /* full reset loop */
      @keyframes loopReset { 0%{opacity:1} 98%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
      .looping { animation: loopReset 14s linear infinite; }
    </style>

    <!-- clip paths for "typing" rows -->
    <clipPath id="c1"><rect x="0" y="0" width="600" height="20"/></clipPath>
    <clipPath id="c2"><rect x="0" y="0" width="600" height="20"/></clipPath>
  </defs>

  <!-- window chrome -->
  <rect width="700" height="420" rx="10" fill="#1e1e1e"/>
  <rect width="700" height="34" rx="10" fill="#2d2d2d"/>
  <rect y="24" width="700" height="10" fill="#2d2d2d"/>
  <!-- traffic lights -->
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="350" y="22" text-anchor="middle" font-family="Menlo,monospace" font-size="12" fill="#888">taproot demo</text>

  <g class="looping">
  <!-- content area -->
  <g class="terminal" transform="translate(24, 60)">

    <!-- line 1: prompt + command -->
    <g class="clip1">
      <text class="prompt">~/myproject</text><text class="dim" x="100"> $ </text><text class="cmd" x="124">npx taproot init --agent claude --with-hooks</text>
    </g>

    <!-- line 2: output -->
    <g class="clip2" transform="translate(0,22)">
      <text class="green">created</text><text class="out" x="60">  .taproot/skills/  (18 skills)</text>
    </g>
    <g class="clip3" transform="translate(0,40)">
      <text class="green">created</text><text class="out" x="60">  .taproot/settings.yaml</text>
    </g>
    <g class="clip4" transform="translate(0,58)">
      <text class="green">installed</text><text class="out" x="72">  .claude/commands/  (Claude adapter)</text>
    </g>
    <g class="clip5" transform="translate(0,76)">
      <text class="green">installed</text><text class="out" x="72">  .git/hooks/pre-commit</text>
    </g>

    <!-- divider -->
    <g class="clip6" transform="translate(0,104)">
      <text class="dim">─────────────────────────────────────────</text>
    </g>

    <!-- line 2: /tr-ineed -->
    <g class="clip7" transform="translate(0,126)">
      <text class="prompt">claude</text><text class="dim" x="48"> › </text><text class="cmd" x="66">/tr-ineed I need user authentication</text>
    </g>

    <g class="clip8" transform="translate(0,148)">
      <text class="blue">Actor:</text><text class="white" x="48">  Developer signing in for the first time</text>
    </g>
    <g class="clip9" transform="translate(0,166)">
      <text class="blue">Need:</text><text class="white" x="42">   Verify identity before accessing the app</text>
    </g>
    <g class="clip10" transform="translate(0,184)">
      <text class="green">written</text><text class="out" x="58">  taproot/auth/login/usecase.md</text>
    </g>

    <!-- divider -->
    <g class="clip11" transform="translate(0,210)">
      <text class="dim">─────────────────────────────────────────</text>
    </g>

    <!-- line 3: taproot dod -->
    <g class="clip12" transform="translate(0,232)">
      <text class="prompt">~/myproject</text><text class="dim" x="100"> $ </text><text class="cmd" x="124">taproot dod taproot/auth/login/rest-api/impl.md</text>
    </g>

    <g class="clip13" transform="translate(0,254)">
      <text class="green">  ✓</text><text class="out" x="18">  baseline-validate-format</text>
    </g>
    <g class="clip14" transform="translate(0,272)">
      <text class="green">  ✓</text><text class="out" x="18">  tests-passing</text>
    </g>
    <g class="clip15" transform="translate(0,290)">
      <text class="green">  ✓</text><text class="white" x="18">  All checks passed. Marked </text><text class="cyan" x="196">impl.md</text><text class="white" x="244"> complete.</text>
    </g>

    <!-- cursor on last line -->
    <g transform="translate(0,315)">
      <text class="prompt">~/myproject</text><text class="dim" x="100"> $ </text><rect class="cursor" x="124" y="-13" width="8" height="15"/>
    </g>

  </g>
  </g>
</svg>
