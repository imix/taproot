name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          BODY=$(awk -v ver="$VERSION_NUM" \
            '$0 ~ "^## \\[" ver "\\]" {found=1;next} found && /^## \[/{exit} found{print}' \
            CHANGELOG.md | sed '/^[[:space:]]*$/d')
          gh release create "$VERSION" \
            --title "taproot $VERSION" \
            --notes "${BODY:-Release $VERSION}"

  # publish-vscode-extension: disabled until publisher account, icon, lockfile, and secrets are ready
  # See taproot/taproot-distribution/vscode-marketplace/multi-surface/impl.md for remaining gaps
