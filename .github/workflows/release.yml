name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack npm tarball
        run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          BODY=$(awk -v ver="$VERSION_NUM" \
            '$0 ~ "^## \\[" ver "\\]" {found=1;next} found && /^## \[/{exit} found{print}' \
            CHANGELOG.md | sed '/^[[:space:]]*$/d')
          TARBALL=$(ls imix-js-taproot-*.tgz | head -1)
          gh release create "$VERSION" \
            --title "taproot $VERSION" \
            --notes "${BODY:-Release $VERSION}" \
            "$TARBALL"

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check token
        run: |
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set or invalid. Add or rotate the token in the 'release' GitHub environment."
            exit 1
          fi

      - name: Download tarball and compute SHA256
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          URL="https://github.com/imix/taproot/archive/refs/tags/${VERSION}.tar.gz"
          echo "Downloading ${URL}"
          curl -fsSL --retry 3 -o taproot.tar.gz "${URL}" || {
            echo "GitHub release tarball not found for ${VERSION} — ensure the GitHub Release was created before this job runs."
            exit 1
          }
          SHA=$(sha256sum taproot.tar.gz | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION_NUM}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Update Formula/taproot.rb in imix/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"
          URL="${{ steps.sha.outputs.url }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/imix/homebrew-tap.git" tap
          cd tap

          mkdir -p Formula
          if [ ! -f Formula/taproot.rb ]; then
            printf 'class Taproot < Formula\n' > Formula/taproot.rb
            printf '  desc "AI-driven specs, enforced at commit time"\n' >> Formula/taproot.rb
            printf '  homepage "https://github.com/imix/taproot"\n' >> Formula/taproot.rb
            printf '  url "%s"\n' "${URL}" >> Formula/taproot.rb
            printf '  sha256 "%s"\n' "${SHA}" >> Formula/taproot.rb
            printf '  version "%s"\n' "${VERSION}" >> Formula/taproot.rb
            printf '  license "MIT"\n\n' >> Formula/taproot.rb
            printf '  depends_on "node"\n\n' >> Formula/taproot.rb
            printf '  def install\n' >> Formula/taproot.rb
            printf '    system "npm", "install", *std_npm_args\n' >> Formula/taproot.rb
            printf '    bin.install_symlink Dir["#{libexec}/bin/*"]\n' >> Formula/taproot.rb
            printf '  end\n\n' >> Formula/taproot.rb
            printf '  test do\n' >> Formula/taproot.rb
            printf '    system "#{bin}/taproot", "--version"\n' >> Formula/taproot.rb
            printf '  end\n' >> Formula/taproot.rb
            printf 'end\n' >> Formula/taproot.rb
          else
            sed -i "s|url \".*\"|url \"${URL}\"|" Formula/taproot.rb
            sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/taproot.rb
            sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/taproot.rb
          fi

          git config user.email "ci@imix.io"
          git config user.name "taproot-ci"
          git add Formula/taproot.rb
          git commit -m "taproot v${VERSION}" || echo "No changes to commit"
          git push || {
            echo "Homebrew tap update failed: push rejected. Retry manually: update Formula/taproot.rb in imix/homebrew-tap to version ${VERSION}."
            exit 1
          }

  publish-vscode-extension:
    name: Publish VS Code Extension
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "VSCE_PAT not set — add it as a repository secret to enable VS Code Marketplace publish."
            exit 1
          fi

      - name: Pre-flight version check
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT_VERSION=$(node -p "require('./vscode-extension/package.json').version")
          if [ "$EXT_VERSION" != "$VERSION" ]; then
            echo "vscode-extension/package.json version ($EXT_VERSION) does not match release version ($VERSION). Update vscode-extension/package.json before releasing."
            exit 1
          fi

      - name: Install extension dependencies
        run: cd vscode-extension && npm ci

      - name: Compile extension
        run: cd vscode-extension && npm run compile

      - name: Build and publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd vscode-extension
          npx @vscode/vsce package --allow-missing-repository
          VSIX=$(ls *.vsix | head -1)
          npx @vscode/vsce publish --pat "$VSCE_PAT" --allow-missing-repository
          gh release upload "${GITHUB_REF_NAME}" "$VSIX" --repo "${GITHUB_REPOSITORY}"

      - name: Publish to Open VSX
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT not set — skipping Open VSX publish."
            exit 0
          fi
          cd vscode-extension
          VSIX=$(ls *.vsix | head -1)
          npx ovsx publish "$VSIX" --pat "$OVSX_PAT" || {
            echo "VS Marketplace ✓ — Open VSX failed. Retry manually: npx ovsx publish $VSIX --pat \$OVSX_PAT"
          }
