version: 1
root: taproot/
commit_pattern: 'taproot\(([^)]+)\):'
commit_trailer: Taproot
agents:
  - claude
  - cursor
  - generic
validation:
  require_dates: true
  require_status: true
  allowed_intent_states:
    - draft
    - active
    - achieved
    - deprecated
  allowed_behaviour_states:
    - proposed
    - specified
    - implemented
    - tested
    - deprecated
  allowed_impl_states:
    - planned
    - in-progress
    - complete
    - needs-rework
definitionOfReady:
  - check-if-affected-by: quality-gates/architecture-compliance
  - check-if-affected-by: quality-gates/nfr-measurability

definitionOfDone:
  - tests-passing
  - document-current: README.md and docs/ accurately reflect all currently implemented CLI commands, skills, and configuration options
  - check-if-affected: src/commands/update.ts
  - check-if-affected: skills/guide.md
  - check-if-affected-by: agent-integration/agent-agnostic-language
  - check-if-affected-by: human-integration/contextual-next-steps
  - check-if-affected-by: human-integration/pause-and-confirm
  - check-if-affected-by: skill-architecture/context-engineering
  - check-if-affected-by: skill-architecture/commit-awareness
  - check-if-affected-by: human-integration/pattern-hints
  - check-if-affected-by: quality-gates/architecture-compliance
  - check: "does this story introduce a cross-cutting concern that warrants a new check-if-affected-by or check-if-affected entry in .taproot/settings.yaml?"
  - check: "does this story reveal a reusable pattern worth documenting in docs/patterns.md?"
